<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-mesh"></div>
    
    <div class="container">
        <header>
            <h1>Churn<span class="highlight">Predict</span> AI</h1>
            <p>Enter customer details below to instantly evaluate their risk of leaving.</p>
        </header>

        <div class="dashboard">
            <form id="churnForm" class="glass-panel form-panel">
                
                <div class="form-section">
                    <h3>Demographics</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Gender</label>
                            <select name="gender">
                                <option value="Female">Female</option>
                                <option value="Male">Male</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Senior Citizen</label>
                            <select name="SeniorCitizen">
                                <option value="0">No (0)</option>
                                <option value="1">Yes (1)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Partner</label>
                            <select name="Partner">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Dependents</label>
                            <select name="Dependents">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Account & Billing</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Tenure (Months)</label>
                            <input type="number" name="tenure" value="12" min="0" max="100">
                        </div>
                        <div class="input-group">
                            <label>Contract Type</label>
                            <select name="Contract">
                                <option value="Month-to-month">Month-to-month</option>
                                <option value="One year">One year</option>
                                <option value="Two year">Two year</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Paperless Billing</label>
                            <select name="PaperlessBilling">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Payment Method</label>
                            <select name="PaymentMethod">
                                <option value="Electronic check">Electronic check</option>
                                <option value="Mailed check">Mailed check</option>
                                <option value="Bank transfer (automatic)">Bank transfer</option>
                                <option value="Credit card (automatic)">Credit card</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Monthly Charges ($)</label>
                            <input type="number" step="0.01" name="MonthlyCharges" value="75.50">
                        </div>
                        <div class="input-group">
                            <label>Total Charges ($)</label>
                            <input type="text" name="TotalCharges" value="906.00">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Services Subscribed</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Internet Service</label>
                            <select name="InternetService">
                                <option value="Fiber optic">Fiber optic</option>
                                <option value="DSL">DSL</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Phone Service</label>
                            <select name="PhoneService">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Multiple Lines</label>
                            <select name="MultipleLines">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No phone service">No phone service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Online Security</label>
                            <select name="OnlineSecurity">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Online Backup</label>
                            <select name="OnlineBackup">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Device Protection</label>
                            <select name="DeviceProtection">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Tech Support</label>
                            <select name="TechSupport">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Streaming TV</label>
                            <select name="StreamingTV">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Streaming Movies</label>
                            <select name="StreamingMovies">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="predict-btn" id="submitBtn">
                    <span class="btn-text">Analyze Customer Risk</span>
                    <div class="spinner hidden" id="loadingSpinner"></div>
                </button>
            </form>

            <div class="glass-panel result-panel">
                <h2>AI Prediction</h2>
                
                <div class="gauge-container">
                    <svg class="circular-chart" viewBox="0 0 36 36">
                        <path class="circle-bg"
                            d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <path class="circle" id="riskRing"
                            stroke-dasharray="0, 100"
                            d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <text x="18" y="20.5" class="percentage" id="riskPercentage">0%</text>
                    </svg>
                </div>
                
                <div class="status-badge" id="riskBadge">Awaiting Input</div>
                <p class="insight-text" id="insightText">Fill out the customer profile and hit analyze to generate a real-time risk assessment.</p>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
